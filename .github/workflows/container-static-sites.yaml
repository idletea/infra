name: build static-sites
on:
  push:
    branches:
      - trunk
    paths:
      - containers/static-sites/**
      - static/**
env:
  REGISTRY: ghcr.io
  NAMESPACE: idletea
  IMAGE: static-sites
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          version: latest
          install: true
          cache: true
          experimental: true
      - name: build templates
        run: |
          mise run static-build
      - name: login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}
      - name: build and publish
        uses: docker/build-push-action@v5
        with:
          context: "."
          file: "containers/static-sites/Containerfile"
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:latest
          push: true
